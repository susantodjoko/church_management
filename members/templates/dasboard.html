<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Gereja</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="mb-4">Dashboard Administrasi Gereja</h2>

    <div class="row">

        <div class="col-md-4">
            <div class="card text-bg-primary mb-3">
                <div class="card-body">
                    <h5>Total Jemaat</h5>
                    <h3>{{ total_member }}</h3>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-bg-success mb-3">
                <div class="card-body">
                    <h5>Total Keluarga</h5>
                    <h3>{{ total_keluarga }}</h3>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-bg-warning mb-3">
                <div class="card-body">
                    <h5>Sudah Baptis</h5>
                    <h3>{{ total_baptis }}</h3>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card text-bg-info mb-3">
                <div class="card-body">
                    <h5>Perpuluhan Bulan Ini</h5>
                    <h3>Rp {{ total_perpuluhan_bulan }}</h3>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card text-bg-dark mb-3">
                <div class="card-body">
                    <h5>Total Semua Perpuluhan</h5>
                    <h3>Rp {{ total_perpuluhan_all }}</h3>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
